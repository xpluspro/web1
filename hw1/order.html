<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认订单 - 书香云端</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">

    <!-- Top Navigation Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-primary-600 tracking-tight">书香云端</a>
                </div>
                
                <nav class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-500 hover:text-gray-900 border-b-2 border-transparent hover:border-gray-300 px-1 pt-1 text-sm font-medium">商店主页</a>
                    <a href="cart.html" class="text-primary-600 border-b-2 border-primary-600 px-1 pt-1 text-sm font-medium">购物车</a>
                    <a href="login.html" class="text-gray-500 hover:text-gray-900 border-b-2 border-transparent hover:border-gray-300 px-1 pt-1 text-sm font-medium">登录/注册</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row gap-8">
        
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 flex-shrink-0 hidden lg:block">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sticky top-24">
                <nav class="space-y-2">
                    <a href="cart.html" class="group flex items-center px-3 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50 rounded-md">
                        <i data-feather="arrow-left" class="text-gray-400 group-hover:text-gray-500 mr-3 flex-shrink-0 h-5 w-5"></i>
                        <span class="truncate">返回购物车</span>
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">填写结算信息</h1>

            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Checkout Flow -->
                <section class="flex-1 space-y-8">
                    
                    <!-- Order Items Detail List -->
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                        <h2 class="text-xl font-bold text-gray-900 mb-6 border-b border-gray-100 pb-2">订单商品</h2>
                        <ul class="divide-y divide-gray-100">
                            <!-- Item 1 -->
                            <li class="py-4 flex items-center">
                                <img src="images/book1.jpg" alt="重构：改善既有代码的设计" class="h-20 w-16 object-contain rounded-md border border-gray-200 p-1 mr-4 bg-gray-50">
                                <div class="flex-1">
                                    <h3 class="font-bold text-gray-900 text-base mb-1">重构：改善既有代码的设计</h3>
                                    <p class="text-sm text-gray-500">作者：Martin Fowler</p>
                                </div>
                                <div class="text-right ml-4">
                                    <div class="font-bold text-gray-900 text-lg">¥89.00</div>
                                    <div class="text-sm text-gray-500">数量: 1</div>
                                </div>
                            </li>
                            <!-- Item 2 -->
                            <li class="py-4 flex items-center">
                                <img src="images/book3.jpg" alt="设计模式" class="h-20 w-16 object-contain rounded-md border border-gray-200 p-1 mr-4 bg-gray-50">
                                <div class="flex-1">
                                    <h3 class="font-bold text-gray-900 text-base mb-1">设计模式：可复用面向对象软件的基础</h3>
                                    <p class="text-sm text-gray-500">作者：Erich Gamma 等</p>
                                </div>
                                <div class="text-right ml-4">
                                    <div class="font-bold text-gray-900 text-lg">¥68.50</div>
                                    <div class="text-sm text-gray-500">数量: 1</div>
                                </div>
                            </li>
                        </ul>
                    </div>

                    <form action="success.html" method="get" class="space-y-6 bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                        <div>
                            <h2 class="text-xl font-bold text-gray-900 mb-4 border-b border-gray-100 pb-2">收货人信息</h2>
                            <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-2">
                                <div>
                                    <label for="first-name" class="block text-sm font-medium text-gray-700">姓名</label>
                                    <input type="text" id="first-name" name="first-name" class="mt-1 focus:ring-primary-500 focus:border-primary-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md py-2 px-3 border" required>
                                </div>
                                <div>
                                    <label for="phone" class="block text-sm font-medium text-gray-700">手机号码</label>
                                    <input type="tel" id="phone" name="phone" class="mt-1 focus:ring-primary-500 focus:border-primary-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md py-2 px-3 border" required>
                                </div>
                                <div class="sm:col-span-2">
                                    <label for="address" class="block text-sm font-medium text-gray-700">详细地址</label>
                                    <input type="text" id="address" name="address" class="mt-1 focus:ring-primary-500 focus:border-primary-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md py-2 px-3 border" placeholder="省、市、区、街道门牌号" required>
                                </div>
                            </div>
                        </div>

                        <div class="pt-6">
                            <h2 class="text-xl font-bold text-gray-900 mb-4 border-b border-gray-100 pb-2">支付方式</h2>
                            <div class="space-y-4">
                                <div class="flex items-center">
                                    <input id="pay-wechat" name="payment-method" type="radio" checked class="focus:ring-primary-500 h-4 w-4 text-primary-600 border-gray-300">
                                    <label for="pay-wechat" class="ml-3 block text-sm font-medium text-gray-700 flex items-center">
                                        微信支付
                                    </label>
                                </div>
                                <div class="flex items-center">
                                    <input id="pay-alipay" name="payment-method" type="radio" class="focus:ring-primary-500 h-4 w-4 text-primary-600 border-gray-300">
                                    <label for="pay-alipay" class="ml-3 block text-sm font-medium text-gray-700">
                                        支付宝
                                    </label>
                                </div>
                                <div class="flex items-center">
                                    <input id="pay-card" name="payment-method" type="radio" class="focus:ring-primary-500 h-4 w-4 text-primary-600 border-gray-300">
                                    <label for="pay-card" class="ml-3 block text-sm font-medium text-gray-700">
                                        信用卡 / 借记卡
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="pt-6">
                            <button type="submit" class="w-full sm:w-auto inline-flex justify-center items-center px-8 py-3 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                                确认提交订单
                            </button>
                        </div>
                    </form>
                </section>

                <!-- Small Cart Summary snippet -->
                <aside class="w-full lg:w-80 flex-shrink-0">
                    <div class="bg-gray-50 rounded-2xl border border-gray-200 p-6 sticky top-24">
                        <h2 class="text-lg font-bold text-gray-900 mb-4 pb-2 border-b border-gray-200">订单内容</h2>
                        
                        <!-- Mini items list -->
                        <ul class="divide-y divide-gray-200 mb-6">
                            <li class="py-3 flex justify-between text-sm">
                                <span class="text-gray-600 truncate mr-4">重构：改善既有代码... x1</span>
                                <span class="font-medium text-gray-900">¥89.00</span>
                            </li>
                            <li class="py-3 flex justify-between text-sm">
                                <span class="text-gray-600 truncate mr-4">设计模式... x1</span>
                                <span class="font-medium text-gray-900">¥68.50</span>
                            </li>
                        </ul>

                        <dl class="space-y-2 text-sm text-gray-600">
                            <div class="flex justify-between">
                                <dt>小计</dt>
                                <dd class="font-medium text-gray-900">¥157.50</dd>
                            </div>
                            <div class="flex justify-between text-green-600">
                                <dt>优惠折扣</dt>
                                <dd class="font-medium">-¥10.00</dd>
                            </div>
                            <div class="flex justify-between border-t border-gray-200 pt-4 mt-4 text-base">
                                <dt class="font-bold text-gray-900">合计应付</dt>
                                <dd class="font-bold text-primary-600 text-xl tracking-tight">¥147.50</dd>
                            </div>
                        </dl>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-12 border-t border-gray-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-center">
            <div class="text-white font-bold text-xl tracking-tight mb-2">书香云端</div>
            <p class="text-sm">© 2026 书香云端 电子书店.</p>
        </div>
    </footer>

    <script>
      feather.replace();
    </script>
</body>
</html>
