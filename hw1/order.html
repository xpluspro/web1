<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单确认 - 书香云端</title>
    <meta name="description" content="您的订单已成功提交。">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>

    <header class="site-header">
        <div class="container nav-container">
            <a href="index.html" class="logo">书香云端</a>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="index.html" class="nav-link">商店主页</a></li>
                    <li class="nav-item"><a href="cart.html" class="nav-link">购物车</a></li>
                    <li class="nav-item"><a href="login.html" class="nav-link">登录/注册</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content container"
        style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 4rem - 200px);">

        <section class="order-success">
            <div class="success-icon">
                <i data-feather="check"></i>
            </div>
            <h1 class="page-title" style="margin-bottom: 0.5rem;">支付成功！</h1>
            <p style="color: var(--text-muted); font-size: 1.125rem;">您的订单已确认，我们将尽快为您安排发货。</p>

            <div class="order-number">
                订单编号：#SF829374091X
            </div>

            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-outline" onclick="window.print()">
                    <i data-feather="printer" style="margin-right: 0.5rem; width: 18px; height: 18px;"></i>
                    打印收据
                </button>
                <a href="index.html" class="btn btn-primary">
                    返回主页
                </a>
            </div>
        </section>

    </main>

    <footer class="site-footer">
        <div class="container footer-content">
            <div class="logo" style="color: white; font-size: 1.25rem;">书香云端</div>
            <p class="footer-text">© 2026 书香云端 电子书店. 保留所有权利。计算机科学与技术软件工程作业。</p>
        </div>
    </footer>

    <script>
        feather.replace()
    </script>
</body>
