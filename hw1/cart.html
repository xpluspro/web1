<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 书香云端</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">

    <!-- Top Navigation Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-primary-600 tracking-tight">书香云端</a>
                </div>
                
                <!-- Search Bar -->
                <div class="flex-1 max-w-lg mx-8 hidden md:block">
                    <div class="relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-feather="search" class="h-4 w-4 text-gray-400"></i>
                        </div>
                        <input type="text" name="search" id="search" class="focus:ring-primary-500 focus:border-primary-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-full bg-gray-100 py-2 border-transparent" placeholder="搜索书名、作者或 ISBN...">
                    </div>
                </div>

                <!-- Nav Links -->
                <nav class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-500 hover:text-gray-900 border-b-2 border-transparent hover:border-gray-300 px-1 pt-1 text-sm font-medium">商店主页</a>
                    <a href="cart.html" class="text-primary-600 border-b-2 border-primary-600 px-1 pt-1 text-sm font-medium">购物车</a>
                    <a href="login.html" class="text-gray-500 hover:text-gray-900 border-b-2 border-transparent hover:border-gray-300 px-1 pt-1 text-sm font-medium">登录/注册</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row gap-8">
        
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 flex-shrink-0 hidden lg:block">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sticky top-24">
                <nav class="space-y-2">
                    <a href="index.html" class="group flex items-center px-3 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50 rounded-md">
                        <i data-feather="arrow-left" class="text-gray-400 group-hover:text-gray-500 mr-3 flex-shrink-0 h-5 w-5"></i>
                        <span class="truncate">继续购物</span>
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">您的购物车</h1>

            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Cart Items List -->
                <section class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <ul class="divide-y divide-gray-100">
                        <!-- Item 1 -->
                        <li class="py-6 flex items-center cart-row">
                            <img src="images/book1.jpg" alt="重构" class="h-24 w-20 object-contain rounded-md bg-gray-50 p-2 border border-gray-100 mr-6">
                            <div class="flex-1">
                                <h3 class="font-bold text-gray-900 text-lg mb-1"><a href="details.html" class="hover:text-primary-600">重构：改善既有代码的设计</a></h3>
                                <p class="text-sm text-gray-500 mb-2">Martin Fowler</p>
                                <div class="font-bold text-gray-900 item-price" data-price="89.00">¥89.00</div>
                            </div>
                            <div class="flex items-center space-x-6 ml-4">
                                <div class="flex items-center border border-gray-300 rounded-md overflow-hidden h-9">
                                    <button type="button" class="px-3 text-gray-500 hover:bg-gray-100 h-full qty-btn" data-action="minus">-</button>
                                    <input type="number" class="w-12 text-center border-none shadow-none text-sm h-full item-qty" value="1" min="1">
                                    <button type="button" class="px-3 text-gray-500 hover:bg-gray-100 h-full qty-btn" data-action="plus">+</button>
                                </div>
                                <button type="button" class="text-sm font-medium text-red-600 hover:text-red-500 remove-btn">移除</button>
                            </div>
                        </li>

                        <!-- Item 2 -->
                        <li class="py-6 flex items-center cart-row">
                            <img src="images/book3.jpg" alt="设计模式" class="h-24 w-20 object-contain rounded-md bg-gray-50 p-2 border border-gray-100 mr-6">
                            <div class="flex-1">
                                <h3 class="font-bold text-gray-900 text-lg mb-1"><a href="details.html" class="hover:text-primary-600">设计模式：可复用面向对象软件的基础</a></h3>
                                <p class="text-sm text-gray-500 mb-2">Erich Gamma 等</p>
                                <div class="font-bold text-gray-900 item-price" data-price="68.50">¥68.50</div>
                            </div>
                            <div class="flex items-center space-x-6 ml-4">
                                <div class="flex items-center border border-gray-300 rounded-md overflow-hidden h-9">
                                    <button type="button" class="px-3 text-gray-500 hover:bg-gray-100 h-full qty-btn" data-action="minus">-</button>
                                    <input type="number" class="w-12 text-center border-none shadow-none text-sm h-full item-qty" value="1" min="1">
                                    <button type="button" class="px-3 text-gray-500 hover:bg-gray-100 h-full qty-btn" data-action="plus">+</button>
                                </div>
                                <button type="button" class="text-sm font-medium text-red-600 hover:text-red-500 remove-btn">移除</button>
                            </div>
                        </li>
                    </ul>
                </section>

                <!-- Cart Summary -->
                <aside class="w-full lg:w-80 flex-shrink-0">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 sticky top-24">
                        <h2 class="text-lg font-bold text-gray-900 mb-6 pb-4 border-b border-gray-100">订单摘要</h2>
                        
                        <dl class="cart-summary space-y-4 text-sm text-gray-600">
                            <div class="flex justify-between">
                                <dt>商品总价</dt>
                                <dd class="font-medium text-gray-900">¥157.50</dd>
                            </div>
                            <div class="flex justify-between">
                                <dt>运费</dt>
                                <dd class="font-medium text-gray-900">¥0.00</dd>
                            </div>
                            <div class="flex justify-between text-green-600">
                                <dt>优惠折扣</dt>
                                <dd class="font-medium">-¥10.00</dd>
                            </div>
                            <div class="flex justify-between border-t border-gray-100 pt-4 mt-4 text-base">
                                <dt class="font-bold text-gray-900">合计金额</dt>
                                <dd class="font-bold text-gray-900">¥147.50</dd>
                            </div>
                        </dl>

                        <div class="mt-6 space-y-3">
                            <a href="order.html" class="w-full flex justify-center items-center px-4 py-3 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                                前往结账
                            </a>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-12 border-t border-gray-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-white font-bold text-xl tracking-tight">书香云端</div>
            <p class="text-sm">© 2026 书香云端 电子书店. 保留所有权利。软件工程作业。</p>
        </div>
    </footer>

    <!-- Init Feather Icons -->
    <script>
      feather.replace();

      // --- Cart Interaction Logic ---
      function updateCartSummary() {
          const rows = document.querySelectorAll('.cart-row');
          let subtotal = 0;
          
          rows.forEach(row => {
              const priceElement = row.querySelector('.item-price');
              const qtyElement = row.querySelector('.item-qty');
              
              if(priceElement && qtyElement) {
                  const price = parseFloat(priceElement.getAttribute('data-price'));
                  const qty = parseInt(qtyElement.value);
                  subtotal += (price * qty);
              }
          });
          
          const discount = rows.length > 0 ? 10.00 : 0.00;
          const total = Math.max(0, subtotal - discount);

          // Update DOM
          const summaryContainer = document.querySelector('.cart-summary');
          if (!summaryContainer) return;
          
          const summaryRows = summaryContainer.querySelectorAll('dd');
          if(summaryRows.length >= 3) {
              summaryRows[0].textContent = `¥${subtotal.toFixed(2)}`;
              summaryRows[2].textContent = rows.length > 0 ? `-¥${discount.toFixed(2)}` : `¥0.00`;
              summaryRows[3].textContent = `¥${total.toFixed(2)}`;
          }
      }

      // Add event listeners to remove buttons
      document.querySelectorAll('.remove-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
              const row = e.target.closest('.cart-row');
              if (row) {
                  row.remove();
                  updateCartSummary();
              }
          });
      });

      // Add event listeners to quantity buttons and inputs
      document.querySelectorAll('.cart-row').forEach(row => {
          const minusBtn = row.querySelector('[data-action="minus"]');
          const plusBtn = row.querySelector('[data-action="plus"]');
          const qtyInput = row.querySelector('.item-qty');

          if(minusBtn && plusBtn && qtyInput) {
              minusBtn.addEventListener('click', () => {
                  let val = parseInt(qtyInput.value);
                  if (val > 1) {
                      qtyInput.value = val - 1;
                      updateCartSummary();
                  }
              });
              
              plusBtn.addEventListener('click', () => {
                  let val = parseInt(qtyInput.value);
                  qtyInput.value = val + 1;
                  updateCartSummary();
              });

              qtyInput.addEventListener('change', () => {
                  let val = parseInt(qtyInput.value);
                  if (isNaN(val) || val < 1) {
                      qtyInput.value = 1;
                  }
                  updateCartSummary();
              });
          }
      });
    </script>
</body>
</html>
