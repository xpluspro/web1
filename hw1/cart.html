<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 书香云端</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">

    <!-- Top Navigation Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Logo -->
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-primary-600 tracking-tight">书香云端</a>
                </div>
                
                <!-- Search Bar -->
                <div class="flex-1 max-w-lg mx-8 hidden md:block">
                    <div class="relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-feather="search" class="h-4 w-4 text-gray-400"></i>
                        </div>
                        <input type="text" name="search" id="search" class="focus:ring-primary-500 focus:border-primary-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-full bg-gray-100 py-2 border-transparent" placeholder="搜索书名、作者或 ISBN...">
                    </div>
                </div>

                <!-- Nav Links -->
                <nav class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-500 hover:text-gray-900 border-b-2 border-transparent hover:border-gray-300 px-1 pt-1 text-sm font-medium">商店主页</a>
                    <a href="cart.html" class="text-primary-600 border-b-2 border-primary-600 px-1 pt-1 text-sm font-medium">购物车</a>
                    <a href="login.html" class="text-gray-500 hover:text-gray-900 border-b-2 border-transparent hover:border-gray-300 px-1 pt-1 text-sm font-medium">登录/注册</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row gap-8">
        
        <!-- Sidebar Navigation -->
        <aside class="w-full md:w-64 flex-shrink-0 hidden lg:block">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sticky top-24">
                <nav class="space-y-2">
                    <a href="index.html" class="group flex items-center px-3 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50 rounded-md">
                        <i data-feather="arrow-left" class="text-gray-400 group-hover:text-gray-500 mr-3 flex-shrink-0 h-5 w-5"></i>
                        <span class="truncate">继续购物</span>
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1">
            <h1 class="text-3xl font-bold text-gray-900 mb-8">您的购物车</h1>

            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Cart Items List -->
                <section class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <ul class="divide-y divide-gray-100" id="cart-items-container">
                        <!-- Items rendered dynamically by cart.js -->
                    </ul>
                </section>

                <!-- Cart Summary -->
                <aside class="w-full lg:w-80 flex-shrink-0">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 sticky top-24">
                        <h2 class="text-lg font-bold text-gray-900 mb-6 pb-4 border-b border-gray-100">订单摘要</h2>
                        
                        <dl class="cart-summary space-y-4 text-sm text-gray-600">
                            <div class="flex justify-between">
                                <dt>商品总价</dt>
                                <dd class="font-medium text-gray-900">¥157.50</dd>
                            </div>
                            <div class="flex justify-between">
                                <dt>运费</dt>
                                <dd class="font-medium text-gray-900">¥0.00</dd>
                            </div>
                            <div class="flex justify-between text-green-600">
                                <dt>优惠折扣</dt>
                                <dd class="font-medium">-¥10.00</dd>
                            </div>
                            <div class="flex justify-between border-t border-gray-100 pt-4 mt-4 text-base">
                                <dt class="font-bold text-gray-900">合计金额</dt>
                                <dd class="font-bold text-gray-900">¥147.50</dd>
                            </div>
                        </dl>

                        <div class="mt-6 space-y-3">
                            <a href="order.html" class="w-full flex justify-center items-center px-4 py-3 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                                前往结账
                            </a>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-12 border-t border-gray-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-white font-bold text-xl tracking-tight">书香云端</div>
            <p class="text-sm">© 2026 书香云端 电子书店. 保留所有权利。软件工程作业。</p>
        </div>
    </footer>

    <!-- Init Feather Icons -->
    <script src="cart.js"></script>
    <script>
      feather.replace();

      function renderCart() {
          const cart = getCart();
          const container = document.getElementById('cart-items-container');
          if (!container) return;
          
          container.innerHTML = '';
          
          if (cart.length === 0) {
              container.innerHTML = '<li class="py-12 text-center text-gray-500 text-lg">您的购物车还是空的，快去选购吧！</li>';
              updateCartSummary(cart);
              return;
          }

          cart.forEach(item => {
              const li = document.createElement('li');
              li.className = 'py-6 flex flex-col sm:flex-row items-center cart-row border-b border-gray-100 last:border-0';
              li.innerHTML = `
                  <img src="${item.image || 'images/book1.jpg'}" alt="${item.title}" class="h-24 w-20 flex-shrink-0 object-contain rounded-md bg-gray-50 p-2 border border-gray-100 sm:mr-6 mb-4 sm:mb-0">
                  <div class="flex-1 text-center sm:text-left w-full sm:w-auto">
                      <h3 class="font-bold text-gray-900 text-lg mb-1"><a href="details${item.id.replace('book', '')}.html" class="hover:text-primary-600">${item.title}</a></h3>
                      <p class="text-sm text-gray-500 mb-2">${item.author || ''}</p>
                      <div class="font-bold text-primary-600 item-price text-lg">¥${item.price.toFixed(2)}</div>
                  </div>
                  <div class="flex items-center justify-between sm:justify-start space-x-6 w-full sm:w-auto mt-4 sm:mt-0 px-4 sm:px-0">
                      <div class="flex items-center border border-gray-300 rounded-md overflow-hidden h-9">
                          <button type="button" class="px-3 text-gray-500 hover:bg-gray-100 h-full qty-btn" onclick="updateItemQty('${item.id}', -1)">-</button>
                          <input type="number" class="w-12 text-center border-none shadow-none text-sm h-full item-qty focus:ring-0" value="${item.qty}" min="1" onchange="setItemQty('${item.id}', this.value)">
                          <button type="button" class="px-3 text-gray-500 hover:bg-gray-100 h-full qty-btn" onclick="updateItemQty('${item.id}', 1)">+</button>
                      </div>
                      <button type="button" class="text-sm font-medium text-red-500 hover:text-red-700 remove-btn transition-colors" onclick="removeItem('${item.id}')">移除商品</button>
                  </div>
              `;
              container.appendChild(li);
          });
          
          updateCartSummary(cart);
      }

      function updateCartSummary(cart) {
          let subtotal = 0;
          cart.forEach(item => { subtotal += item.price * item.qty; });
          
          const discount = cart.length > 0 ? 10.00 : 0.00;
          const total = Math.max(0, subtotal - discount);

          const summaryContainer = document.querySelector('.cart-summary');
          if (!summaryContainer) return;
          
          const summaryRows = summaryContainer.querySelectorAll('dd');
          if(summaryRows.length >= 3) {
              summaryRows[0].textContent = `¥${subtotal.toFixed(2)}`;
              
              summaryRows[2].textContent = cart.length > 0 ? `-¥${discount.toFixed(2)}` : `¥0.00`;
              summaryRows[3].textContent = `¥${total.toFixed(2)}`;
          }
      }

      window.addEventListener('cartUpdated', renderCart);
      document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
