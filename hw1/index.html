<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书香云端 eBook Store - 发现好书</title>
    <meta name="description" content="书香云端 eBook Store 主页，发现并选购您喜爱的电子书。">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>

    <header class="site-header">
        <div class="container nav-container">
            <a href="index.html" class="logo">书香云端</a>
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="index.html" class="nav-link active">商店主页</a></li>
                    <li class="nav-item"><a href="cart.html" class="nav-link">购物车</a></li>

    <main class="main-content container">
        <h1 class="page-title">发现好书</h1>

        <section class="book-grid">
            <!-- Book Item 1 -->
            <article class="book-card">
                <a href="details.html" class="book-cover-wrapper">
                    <figure style="margin: 0; padding: 0; height: 100%;">
                        <img src="images/book1.jpg" alt="重构：改善既有代码的设计" class="book-cover">
                    </figure>
                </a>
                <div class="book-info">
                    <span class="book-category">软件工程</span>
                    <h2 class="book-title"><a href="details.html">重构：改善既有代码的设计</a></h2>
                    <p class="book-author">Martin Fowler</p>
                    <div class="book-footer">
                        <span class="book-price">¥89.00</span>
                        <button class="btn btn-primary" onclick="alert('已加入购物车')">
                            <i data-feather="shopping-cart" style="width: 16px; height: 16px;"></i>
                        </button>
                    </div>
                </div>
            </article>

            <!-- Book Item 2 -->
            <article class="book-card">
                <a href="details.html" class="book-cover-wrapper">

                    <span class="book-category">项目管理</span>

                </div>

            <!-- Book Item 3 -->

                <a href="details.html" class="book-cover-wrapper">
                    <figure style="margin: 0; padding: 0; height: 100%;">

                    </figure>
                </a>
                <div class="book-info">
                    <span class="book-category">软件架构</span>
                    <h2 class="book-title"><a href="details.html">设计模式：可复用面向对象软件的基础</a></h2>

                    <div class="book-footer">
                        <span class="book-price">¥68.50</span>
                        <button class="btn btn-primary" onclick="alert('已加入购物车')">
                            <i data-feather="shopping-cart" style="width: 16px; height: 16px;"></i>
                        </button>
                    </div>
                </div>
            </article>

            <!-- Book Item 4 -->
            <article class="book-card">
                <a href="details.html" class="book-cover-wrapper">
                    <figure style="margin: 0; padding: 0; height: 100%;">

                            <i data-feather="shopping-cart" style="width: 16px; height: 16px;"></i>

                    </div>
